services:
  postgres:
    image: postgres:16-alpine
    container_name: price-subscriptions-postgres
    environment:
      POSTGRES_DB: price_subscriptions
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d price_subscriptions"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: price-subscriptions-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: price-subscriptions-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic price.changed --partitions 6 --replication-factor 1 && \
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic price.changed.dlq --partitions 3 --replication-factor 1

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: price-subscriptions-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://app:app@postgres:5432/price_subscriptions?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "price.changed"
    ports:
      - "8080:8080"
    command: ["/app/api"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    image: nginx:1.27-alpine
    container_name: price-subscriptions-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://app:app@postgres:5432/price_subscriptions?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "price.changed"
      KAFKA_GROUP_ID: "price-subscriptions-consumer"
      KAFKA_DLQ_TOPIC: "price.changed.dlq"
      KAFKA_CONCURRENCY: "8"
      DB_MAX_CONNS: "25"
      NOTIFICATION_BATCH_SIZE: "1000"
    command: ["/app/consumer"]
    deploy:
      replicas: 3

volumes:
  postgres_data:
